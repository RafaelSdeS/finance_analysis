name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Lint
        run: ruff check .

      - name: Fast tests (pure code, synthetic data)
        run: python tests/run_all.py --group fast

      - name: Build Stage 2 dataset from git-tracked raw data
        run: python -m src.build_dataset.build_ml_dataset

      - name: Prepare agent training dataset
        run: python src/agent/feature_engineering.py

      - name: Build agent tensors and scaler
        run: python -m src.agent.data_pipeline

      - name: Validate built dataset and data tests
        run: python tests/run_all.py --group data
